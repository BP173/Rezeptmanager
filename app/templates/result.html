<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Einkaufsliste</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-600 to-blue-900 min-h-screen text-white">

<div class="max-w-4xl mx-auto p-6">

  <h1 class="text-2xl font-semibold mb-6">{{ menu.name }}</h1>

  <div class="bg-white text-slate-800 rounded-2xl shadow-xl p-6">

    <table class="w-full text-sm">
      <thead>
        <tr class="border-b">
          <th class="text-left py-2">Produkt</th>
          <th>Menge</th>
          <th>Einheit</th>
          <th>Preis</th>
          <th>Gesamt</th>
        </tr>
      </thead>

      <tbody>
        {% for item in result.values() %}
        <tr class="border-b">
          <td class="py-2">{{ item.name }}</td>
          <td class="text-center">{{ item.amount }}</td>
          <td class="text-center">{{ item.unit }}</td>
          <td class="text-center">{{ item.price }} €</td>
          <td class="text-center font-medium">{{ item.total_price | round(2) }} €</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="mt-6 text-right text-lg font-semibold">
      Gesamt: {{ total_cost | round(2) }} €
    </div>

  </div>

  <a href="/" class="inline-block mt-6 bg-white/20 px-4 py-2 rounded">
    ← Zurück
  </a>

</div>

</body>
</html>
